<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">ELVORA</div>

    <ul class="nav-links">
        <li><a href="home.html">Home</a></li>

<!-- PRODUCT SECTION -->
<div class="container product-page">

        <div class="product-image">
            <img id="main-img" src="" alt="">
        </div>

        <!-- RIGHT: DETAILS -->
        <div class="product-details">

            <p class="price" id="product-price"></p>

            <p id="product-desc"></p>

            <h4>Select Size:</h4>
            <div class="sizes">
                <span>S</span>
                <span>M</span>
                <span>L</span>
            </div>

            <div class="product-buttons">
                <button class="btn" onclick="addToCart()">Add to Cart</button>

            </div>

        </div>

</div>

// LOAD PRODUCT
const product = productsData[productId];

if(product){
    document.getElementById("main-img").src = product.image;
    document.getElementById("product-title").innerText = product.title;
    document.getElementById("product-price").innerText = product.price;
    document.getElementById("product-desc").innerText = product.desc;
}

// ADD TO CART
function addToCart(){
    let cart = JSON.parse(localStorage.getItem("elvora_cart")) || [];

    const existing = cart.find(item => item.id === productId);

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({
            id: productId,
            quantity: 1,
            image: product.image,
            title: product.title,
            price: product.price
        });
    }

    localStorage.setItem("elvora_cart", JSON.stringify(cart));

    alert("Added to cart!");
    window.location.href = "cart.html"; // redirect
}

// ADD TO WISHLIST
function addToWishlist(){
    let wishlist = JSON.parse(localStorage.getItem("elvora_wishlist")) || [];

    if(!wishlist.includes(productId)){
        wishlist.push(productId);
    }

    localStorage.setItem("elvora_wishlist", JSON.stringify(wishlist));

    alert("Added to wishlist!");
}
</script>
