<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELVORA - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">ÉLVORA</div>

    <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
    </ul>

    <div class="nav-icons">
        <!-- Search Icon -->
        <a href="#" id="search-btn" class="icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7" stroke="#C2567A" stroke-width="2"/>
                <line x1="16" y1="16" x2="22" y2="22" stroke="#C2567A" stroke-width="2"/>
            </svg>
        </a>

        <!-- Wishlist Icon -->
        <a href="wishlist.html" class="icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M12 21s-6-4.35-9-8.5C-1 8 1 3 5 3c2.54 0 4 1.5 4 1.5S10.46 3 13 3c4 0 6 5 2 9.5C18 16.65 12 21 12 21z"
                      stroke="#C2567A" stroke-width="2" fill="none"/>
            </svg>
        </a>

        <!-- Profile Icon -->
        <a href="#" id="profile-btn" class="icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="#C2567A" stroke-width="2"/>
                <path d="M4 21c0-4 4-7 8-7s8 3 8 7" stroke="#C2567A" stroke-width="2" fill="none"/>
            </svg>
        </a>

        <!-- Cart Icon -->
        <a href="cart.html" class="icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="9" cy="21" r="1" stroke="#C2567A" stroke-width="2"/>
                <circle cx="20" cy="21" r="1" stroke="#C2567A" stroke-width="2"/>
                <path d="M1 1h4l2.5 13a2 2 0 0 0 2 1.5h10a2 2 0 0 0 2-1.5L23 6H6"
                      stroke="#C2567A" stroke-width="2" fill="none"/>
            </svg>
        </a>
    </div>
</nav>

<!-- Search Modal -->
<div id="search-panel" class="search-modal" aria-label="Search panel">
    <span class="close-btn" id="search-close">&times;</span>
    <div class="search-modal-content">
        <input id="search-input" type="text" placeholder="Search products, categories...">
        <button id="search-submit" class="btn">Search</button>
    </div>
</div>

<!-- Profile Modal -->
<div id="profile-panel" class="search-modal" aria-label="Profile panel">
    <span class="close-btn" id="profile-close">&times;</span>
    <div class="search-modal-content">
        <h2>Your Account</h2>
        <a href="myaccount.html" class="btn">My Account</a>
        <a href="myorders.html" class="btn">Orders</a>
        <a href="wishlist.html" class="btn">Wishlist</a>
        <button class="btn" onclick="logoutUser()">Logout</button>
    </div>
</div>

<div class="container">
    <h2 class="section-title">My Cart</h2>

    <div id="cart-container">
        <div id="empty-cart" class="empty-state">
            <h3>Your cart is empty</h3>
            <p>Add items you love to your cart and checkout here.</p>
            <a href="shop.html" class="btn">Start Shopping</a>
        </div>
    </div>

    <div id="cart-total" class="cart-total"></div>
</div>

<script>
// Modal functionality
const searchBtn = document.getElementById('search-btn');
const profileBtn = document.getElementById('profile-btn');
const searchPanel = document.getElementById('search-panel');
const profilePanel = document.getElementById('profile-panel');
const searchClose = document.getElementById('search-close');
const profileClose = document.getElementById('profile-close');

searchBtn.addEventListener('click', e => { e.preventDefault(); searchPanel.style.display = 'flex'; });
profileBtn.addEventListener('click', e => { e.preventDefault(); profilePanel.style.display = 'flex'; });
searchClose.addEventListener('click', () => { searchPanel.style.display = 'none'; });
profileClose.addEventListener('click', () => { profilePanel.style.display = 'none'; });
window.addEventListener('click', e => {
    if (e.target === searchPanel) searchPanel.style.display = 'none';
    if (e.target === profilePanel) profilePanel.style.display = 'none';
});

// Full productsData from wishlist.html
const productsData = {
    dress1: { title: "Elegant Pink Feather Dress", price: "₹1,299", images: ["images/shop-dress-01.jpg"] },
    dress2: { title: "Soft Pink Corset Dress", price: "₹1,499", images: ["images/dress2.jpg.jpg"] },
    dress3: { title: "Elegant Bodycon Dress", price: "₹1,799", images: ["images/dress3.jpg.jpg"] },
    dress4: { title: "Summer Frill Dress", price: "₹1,099", images: ["images/shop-dress-02.jpg"] },
    dress5: { title: "Cotton Midi Dress", price: "₹1,399", images: ["images/dress1.jpg.jpg"] },
    dress6: { title: "Chic Wrap Dress", price: "₹1,899", images: ["images/download (13).jpg"] },
    top1: { title: "White Ruffle Top", price: "₹799", images: ["images/top1.jpg.jpg"] },
    top2: { title: "Pink Satin Top", price: "₹899", images: ["images/top2.jpg.jpg"] },
    top3: { title: "Off-Shoulder Top", price: "₹999", images: ["images/top3.jpg.jpg"] },
    top4: { title: "Floral Puff Sleeve Top", price: "₹899", images: ["images/top4.jpg.jpg"] },
    winter1: { title: "Beige Wool Coat", price: "₹2,499", images: ["images/trend1.jpg.jpg"] },
    winter2: { title: "Blazer with Bottom", price: "₹1,499", images: ["images/trend2.jpg.jpg"] },
    winter3: { title: "Pink Coat with Bottom", price: "₹1,799", images: ["images/trend3.jpg.jpg"] }
    // ... add all other products as in wishlist.html
};

// Cart functions
function getCart() {
    const cart = localStorage.getItem('elvora_cart');
    return cart ? JSON.parse(cart) : [];
}

function saveCart(cart) {
    localStorage.setItem('elvora_cart', JSON.stringify(cart));
}

function removeFromCart(productId) {
    let cart = getCart();
    cart = cart.filter(item => item.id !== productId);
    saveCart(cart);
    displayCart();
}

function displayCart() {
    const cart = getCart();
    const container = document.getElementById('cart-container');
    const emptyState = document.getElementById('empty-cart');
    const cartTotal = document.getElementById('cart-total');

    if (cart.length === 0) {
        emptyState.style.display = 'block';
        container.innerHTML = '';
        container.appendChild(emptyState);
        cartTotal.innerHTML = '';
        return;
    }

    emptyState.style.display = 'none';

    const cartGrid = document.createElement('div');
    cartGrid.className = 'shop-grid';

    let totalPrice = 0;

    cart.forEach(item => {
        const product = productsData[item.id];
        if (!product) return;

        const quantity = item.quantity || 1;
        const priceNumber = Number(product.price.replace('₹','').replace(',',''));
        totalPrice += priceNumber * quantity;

        const card = document.createElement('div');
        card.className = 'shop-card cart-card';
        card.innerHTML = `
            <img src="${product.images[0]}" alt="${product.title}">
            <h3>${product.title}</h3>
            <p class="price">${product.price} x ${quantity}</p>
            <button class="btn small-btn remove-btn" onclick="removeFromCart('${item.id}')">Remove</button>
        `;
        cartGrid.appendChild(card);
    });

    container.innerHTML = '';
    container.appendChild(cartGrid);

    cartTotal.innerHTML = `<h3>Total: ₹${totalPrice.toLocaleString()}</h3>`;
}

document.addEventListener('DOMContentLoaded', displayCart);

// Logout function
function logoutUser() {
    localStorage.clear();
    alert('Logged out successfully!');
    window.location.href = 'home.html';
}
</script>

</body>
</html>
